<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="onlineCred-dark.ico" type="image/x-icon">
    <title>Test Code Send | onl-cred-mngr</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 p-4 flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">

        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">🔐 Code Manager</h1>
            <p class="text-sm text-gray-500">Enter a 5‑character code</p>
        </div>

        <div id="currentPcDisplay"
            class="text-center bg-blue-50 text-blue-700 font-mono text-sm py-1 rounded-lg border border-blue-200">
            Loading PC…
        </div>

        <!-- Use traditional form submission -->
        <form id="contactForm" action="https://script.google.com/macros/s/AKfycbzhrXlLuVqv2g3ykptghlNL0wgqB6pvf5l2AQn67Y4jplL3_YiQQfSDwbckI59ZZJ1mdA/exec" method="POST" target="hiddenFrame" class="space-y-4">
            <div>
                <label for="code" class="block text-sm font-medium text-gray-700">
                    Code <span class="text-red-500">*</span>
                </label>
                <input id="code" name="code" maxlength="5" minlength="5" required placeholder="Enter 5 characters"
                    class="w-full mt-1 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" />
                <input type="hidden" name="pc" id="pcHidden" value="" />
                <input type="hidden" name="id" id="idHidden" value="" />
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl disabled:opacity-70 transition">
                <span id="spinner" class="hidden inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin align-middle mr-2"></span>
                <span id="btnText">Submit</span>
            </button>

            <div id="statusMsg" class="hidden text-sm font-medium p-3 rounded-xl"></div>
        </form>

        <!-- Hidden iframe to handle form submission without page reload -->
        <iframe name="hiddenFrame" id="hiddenFrame" style="display:none;"></iframe>

        <div class="border-t pt-3">
            <button id="generateBtn"
                class="w-full text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">
                🔗 Show / Hide 32 PC URLs
            </button>
            <div id="urlList"
                class="mt-2 hidden max-h-60 overflow-y-auto bg-gray-50 rounded-lg p-2 border border-gray-200 text-xs">
            </div>
        </div>

        <div class="text-xs text-gray-400 text-center border-t pt-2">
            Data stored in Google Sheets &bull; One row per PC
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            function getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const obj = {};
                for (const [key, value] of params.entries()) {
                    obj[key] = value;
                }
                return obj;
            }

            const urlParams = getUrlParams();
            const currentPc = urlParams.pc || null;

            // Set hidden fields
            if (currentPc) {
                document.getElementById('pcHidden').value = currentPc;
                document.getElementById('idHidden').value = currentPc;
                document.getElementById('currentPcDisplay').textContent = `📌 Current PC: ${currentPc}`;
            } else {
                document.getElementById('currentPcDisplay').textContent = '⚠️ No PC parameter in URL (add ?pc=1 to the URL)';
                document.getElementById('currentPcDisplay').className = 'text-center bg-yellow-50 text-yellow-700 font-mono text-sm py-1 rounded-lg border border-yellow-200';
            }

            // Handle iframe response
            document.getElementById('hiddenFrame').addEventListener('load', function() {
                try {
                    const response = this.contentDocument.body.textContent;
                    const data = JSON.parse(response);
                    
                    if (data.success) {
                        showStatus('✅ Submitted successfully!', 'success');
                        document.getElementById('code').value = '';
                    } else {
                        showStatus('❌ ' + (data.error || 'Server error'), 'error');
                    }
                } catch (e) {
                    // If response is not JSON, it might be HTML error
                    showStatus('❌ Submission failed. Please try again.', 'error');
                }
                setLoading(false);
            });

            function showStatus(message, type) {
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.className = `text-sm font-medium p-3 rounded-xl ${type === 'success'
                        ? 'bg-green-50 text-green-700 border border-green-200'
                        : 'bg-red-50 text-red-700 border border-red-200'
                    }`;
                statusMsg.textContent = message;
                statusMsg.classList.remove('hidden');
            }

            function setLoading(isLoading) {
                const submitBtn = document.getElementById('submitBtn');
                const spinner = document.getElementById('spinner');
                const btnText = document.getElementById('btnText');
                
                submitBtn.disabled = isLoading;
                spinner.classList.toggle('hidden', !isLoading);
                btnText.textContent = isLoading ? 'Sending…' : 'Submit';
            }

            // Form validation
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                const code = document.getElementById('code').value.trim();
                if (code.length !== 5) {
                    e.preventDefault();
                    showStatus('Please enter exactly 5 characters.', 'error');
                    return false;
                }
                setLoading(true);
                showStatus('', '');
            });

            function generateUrls() {
                const base = window.location.origin + window.location.pathname;
                const urls = [];
                for (let i = 1; i <= 32; i++) {
                    urls.push(`${base}?pc=${i}`);
                }
                return urls;
            }

            function renderUrlList() {
                const urls = generateUrls();
                const urlList = document.getElementById('urlList');
                urlList.innerHTML = '';
                const ul = document.createElement('ul');
                ul.className = 'space-y-1';
                urls.forEach((url, index) => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between text-sm';
                    const span = document.createElement('span');
                    span.textContent = `PC-${index + 1}`;
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.className = 'text-blue-600 hover:underline font-mono text-xs break-all';
                    a.textContent = url;
                    li.appendChild(span);
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                urlList.appendChild(ul);
            }

            document.getElementById('generateBtn').addEventListener('click', function () {
                const urlList = document.getElementById('urlList');
                if (urlList.classList.contains('hidden')) {
                    urlList.classList.remove('hidden');
                    renderUrlList();
                    this.textContent = '🔽 Hide 32 PC URLs';
                } else {
                    urlList.classList.add('hidden');
                    this.textContent = '🔗 Show / Hide 32 PC URLs';
                }
            });

            console.log('📋 Code Manager loaded');
            console.log('Current URL params:', urlParams);
        })();
    </script>
</body>

</html>
