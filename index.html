<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="onlineCred-dark.ico" type="image/x-icon">
    <title>Test Code Send | onl-cred-mngr</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 p-4 flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">

        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">🔐 Code Manager</h1>
            <p class="text-sm text-gray-500">Enter a 5‑character code</p>
        </div>

        <div id="currentPcDisplay"
            class="text-center bg-blue-50 text-blue-700 font-mono text-sm py-1 rounded-lg border border-blue-200">
            Loading PC…
        </div>

        <form id="contactForm" novalidate class="space-y-4">
            <div>
                <label for="code" class="block text-sm font-medium text-gray-700">
                    Code <span class="text-red-500">*</span>
                </label>
                <input id="code" name="code" maxlength="5" minlength="5" required placeholder="Enter 5 characters"
                    class="w-full mt-1 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" />
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl disabled:opacity-70 transition">
                <span id="spinner"
                    class="hidden inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin align-middle mr-2"></span>
                <span id="btnText">Submit</span>
            </button>

            <div id="statusMsg" class="hidden text-sm font-medium p-3 rounded-xl"></div>
        </form>

        <div class="border-t pt-3">
            <button id="generateBtn"
                class="w-full text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">
                🔗 Show / Hide 32 PC URLs
            </button>
            <div id="urlList"
                class="mt-2 hidden max-h-60 overflow-y-auto bg-gray-50 rounded-lg p-2 border border-gray-200 text-xs">
            </div>
        </div>

        <div class="text-xs text-gray-400 text-center border-t pt-2">
            Data stored in Google Sheets &bull; One row per PC
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhrXlLuVqv2g3ykptghlNL0wgqB6pvf5l2AQn67Y4jplL3_YiQQfSDwbckI59ZZJ1mdA/exec';

            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const statusMsg = document.getElementById('statusMsg');
            const currentPcDisplay = document.getElementById('currentPcDisplay');
            const generateBtn = document.getElementById('generateBtn');
            const urlList = document.getElementById('urlList');

            function getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const obj = {};
                for (const [key, value] of params.entries()) {
                    obj[key] = value;
                }
                return obj;
            }

            const urlParams = getUrlParams();
            const currentPc = urlParams.pc || null;

            if (currentPc) {
                currentPcDisplay.textContent = `📌 Current PC: ${currentPc}`;
            } else {
                currentPcDisplay.textContent = '⚠️ No PC parameter in URL (add ?pc=1 to the URL)';
                currentPcDisplay.className = 'text-center bg-yellow-50 text-yellow-700 font-mono text-sm py-1 rounded-lg border border-yellow-200';
            }

            function generateUrls() {
                const base = window.location.origin + window.location.pathname;
                const urls = [];
                for (let i = 1; i <= 32; i++) {
                    urls.push(`${base}?pc=${i}`);
                }
                return urls;
            }

            function renderUrlList() {
                const urls = generateUrls();
                urlList.innerHTML = '';
                const ul = document.createElement('ul');
                ul.className = 'space-y-1';
                urls.forEach((url, index) => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between text-sm';
                    const span = document.createElement('span');
                    span.textContent = `PC-${index + 1}`;
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.className = 'text-blue-600 hover:underline font-mono text-xs break-all';
                    a.textContent = url;
                    li.appendChild(span);
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                urlList.appendChild(ul);
            }

            generateBtn.addEventListener('click', function () {
                if (urlList.classList.contains('hidden')) {
                    urlList.classList.remove('hidden');
                    renderUrlList();
                    generateBtn.textContent = '🔽 Hide 32 PC URLs';
                } else {
                    urlList.classList.add('hidden');
                    generateBtn.textContent = '🔗 Show / Hide 32 PC URLs';
                }
            });

            function showStatus(message, type) {
                statusMsg.className = `text-sm font-medium p-3 rounded-xl ${type === 'success'
                    ? 'bg-green-50 text-green-700 border border-green-200'
                    : 'bg-red-50 text-red-700 border border-red-200'
                    }`;
                statusMsg.textContent = message;
                statusMsg.classList.remove('hidden');
            }

            function hideStatus() {
                statusMsg.className = 'hidden';
                statusMsg.textContent = '';
            }

            function setLoading(isLoading) {
                submitBtn.disabled = isLoading;
                spinner.classList.toggle('hidden', !isLoading);
                btnText.textContent = isLoading ? 'Sending…' : 'Submit';
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideStatus();

                const code = document.getElementById('code').value.trim();
                if (code.length !== 5) {
                    showStatus('Please enter exactly 5 characters.', 'error');
                    return;
                }

                // Build URLSearchParams
                const formData = new URLSearchParams();
                formData.append("code", code);
                formData.append("pc", urlParams.pc || "");
                formData.append("id", urlParams.pc || "");

                setLoading(true);

                // In your HTML, replace the fetch call with this:
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success) {
                        showStatus('✅ Submitted successfully!', 'success');
                        form.reset();
                    } else {
                        showStatus('❌ ' + (result.error || 'Server error'), 'error');
                    }
                } catch (error) {
                    console.error('Submission error:', error);
                    showStatus('❌ Submission failed. Check console.', 'error');
                }
            });

            document.getElementById('code').addEventListener('input', hideStatus);

            console.log('📋 Code Manager loaded');
            console.log('Current URL params:', urlParams);
            console.log('SCRIPT_URL:', SCRIPT_URL);
        })();
    </script>
</body>

</html>
